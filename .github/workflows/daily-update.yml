name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 12-22/2 * * 1-5'  # every 2 hours, 8am-6pm ET (UTC-4), weekdays only
  workflow_dispatch:               # lets you trigger it manually too

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard script
        env:
          LITMOS_API_KEY: ${{ secrets.LITMOS_API_KEY }}
        run: python generate_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html completed.json
          git commit -m "dashboard update $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push --force